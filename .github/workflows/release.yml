name: Build and Release Tauri App

on:
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装依赖
        run: npm install

      # === 构建离线版（保留现有 ui 文件夹）===
      - name: 编译离线版（带 ui 文件夹）
        run: npm run tauri build

      # === 构建单文件在线版（使用 index2.html）===
      - name: 编译单文件绿色版（index2.html）
        run: |
          npm run tauri build -- --config "{\"build\":{\"frontendDist\":\"../index2.html\"}}"

      # === 打包绿色便携版（单文件）===
      - name: 打包单文件绿色版 zip
        run: |
          Compress-Archive -Path "src-tauri/target/release/yahei-alarm-clock.exe" -DestinationPath YaheiAlarmClock-SingleFile.zip -Force

      # === 打包离线版（可选，保持原有）===
      - name: 打包离线绿色版 zip
        run: |
          New-Item -ItemType Directory -Force -Path portable
          Copy-Item src-tauri\target\release\yahei-alarm-clock.exe portable\
          Copy-Item ui -Destination portable\ui -Recurse -Force
          Compress-Archive -Path portable\* -DestinationPath YaheiAlarmClock-Portable.zip -Force

      - name: 删除旧 Release
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete v1.0.0 --yes --cleanup-tag

      - name: 创建 Release 并上传文件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v1.0.0 `
            --title "极简雅黑桌面闹钟 v1.0.0" `
            --notes "离线完整版（带 ui 文件夹） + 单文件绿色便携版（在线资源）" `
            src-tauri/target/release/bundle/nsis/*.exe `
            src-tauri/target/release/bundle/msi/*.msi `
            YaheiAlarmClock-SingleFile.zip `
            YaheiAlarmClock-Portable.zip
